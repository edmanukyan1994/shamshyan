<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GeoAuth — Показать местоположение вошедшего пользователя</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Основной контейнер */
        .app-container {
            width: 100%;
            max-width: 1200px;
            background: rgba(255,255,255,0.9);
            border-radius: 32px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            backdrop-filter: blur(2px);
            transition: all 0.3s ease;
        }

        /* Шапка */
        .header {
            background: #1a2a3a;
            color: white;
            padding: 20px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo h1 {
            font-size: 1.7rem;
            letter-spacing: -0.5px;
        }
        .logo p {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .user-status {
            background: #2c3e4e;
            padding: 8px 16px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #logoutBtn {
            background: #dc2f2f;
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        #logoutBtn:hover {
            background: #b91c1c;
            transform: scale(0.96);
        }

        /* Контент */
        .content {
            padding: 28px;
        }

        /* Форма входа */
        .login-card {
            max-width: 450px;
            margin: 20px auto;
            background: white;
            border-radius: 28px;
            padding: 32px 28px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        .login-card h2 {
            margin-bottom: 20px;
            color: #1e2f3f;
        }
        .login-card input {
            width: 100%;
            padding: 14px 18px;
            margin: 12px 0;
            border: 1px solid #ccc;
            border-radius: 60px;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }
        .login-card input:focus {
            border-color: #2c7da0;
            box-shadow: 0 0 0 3px rgba(44,125,160,0.2);
        }
        .login-card button {
            width: 100%;
            background: #2c7da0;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 8px;
            transition: 0.2s;
        }
        .login-card button:hover {
            background: #1f5e7a;
        }
        .demo-hint {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #4a627a;
            background: #eef2f7;
            padding: 10px;
            border-radius: 50px;
        }

        /* Блок с картой */
        .map-section {
            background: #f4f9ff;
            border-radius: 28px;
            padding: 6px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        #map {
            height: 450px;
            border-radius: 24px;
            z-index: 1;
        }
        .location-info {
            margin-top: 20px;
            background: white;
            border-radius: 24px;
            padding: 18px 22px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            box-shadow: 0 5px 12px rgba(0,0,0,0.05);
        }
        .coords {
            font-family: monospace;
            font-size: 1rem;
            background: #eef2fa;
            padding: 8px 16px;
            border-radius: 40px;
        }
        .address {
            font-weight: 500;
            color: #1f5e7a;
        }
        .error-msg {
            background: #ffe3e3;
            color: #b00020;
            padding: 12px;
            border-radius: 28px;
            text-align: center;
        }
        .loading {
            text-align: center;
            padding: 40px;
            font-style: italic;
            color: #2c7da0;
        }
        .hidden {
            display: none;
        }
        footer {
            text-align: center;
            font-size: 0.75rem;
            padding: 18px;
            color: #3a5e7a;
            border-top: 1px solid #cddfe7;
        }
        button {
            user-select: none;
        }
        @media (max-width: 700px) {
            .header {
                flex-direction: column;
                text-align: center;
            }
            .location-info {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
<div class="app-container" id="app">
    <div class="header">
        <div class="logo">
            <h1>📍 GeoWatch</h1>
            <p>Показ местоположения авторизованного пользователя</p>
        </div>
        <div class="user-status" id="userStatusArea">
            <span id="userNameDisplay">Гость</span>
            <button id="logoutBtn" class="hidden">Выйти</button>
        </div>
    </div>
    <div class="content" id="mainContent">
        <!-- Здесь динамически переключаем форму и карту -->
        <div id="loginPanel"></div>
        <div id="dashboardPanel" class="hidden">
            <div class="map-section">
                <div id="map"></div>
            </div>
            <div class="location-info" id="locationInfo">
                <div class="coords" id="coordText">📍 Ожидание координат...</div>
                <div class="address" id="addressText">🏠 Получение адреса...</div>
            </div>
        </div>
    </div>
    <footer>
        🔐 Демо-доступ: demo / demo123  •  Геолокация запрашивается только после входа
    </footer>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // ---------- Конфигурация ----------
    // Простая имитация базы пользователей (только для демонстрации)
    const VALID_CREDENTIALS = {
        username: "demo",
        password: "demo123"
    };

    // Элементы DOM
    const loginPanelDiv = document.getElementById('loginPanel');
    const dashboardPanel = document.getElementById('dashboardPanel');
    const logoutBtn = document.getElementById('logoutBtn');
    const userNameSpan = document.getElementById('userNameDisplay');
    const coordTextSpan = document.getElementById('coordText');
    const addressTextSpan = document.getElementById('addressText');

    // Глобальные переменные карты и маркера
    let mapInstance = null;
    let currentMarker = null;
    let currentUser = null;      // храним имя вошедшего пользователя

    // ---------- Вспомогательные функции ----------
    function showLoginForm() {
        // Скрыть дашборд, показать форму входа
        dashboardPanel.classList.add('hidden');
        loginPanelDiv.classList.remove('hidden');
        logoutBtn.classList.add('hidden');
        userNameSpan.innerText = 'Гость';
        // очищаем данные локации в интерфейсе, если вдруг что
        coordTextSpan.innerText = '📍 Ожидание координат...';
        addressTextSpan.innerText = '🏠 Получение адреса...';
        // Если карта была создана — удаляем её, чтобы не висла в памяти
        if (mapInstance) {
            mapInstance.remove();
            mapInstance = null;
            currentMarker = null;
        }
        // рендерим форму входа (можно просто через innerHTML, но лучше динамически)
        renderLoginForm();
    }

    function renderLoginForm() {
        loginPanelDiv.innerHTML = `
            <div class="login-card">
                <h2>🔐 Вход в систему</h2>
                <input type="text" id="loginUsername" placeholder="Имя пользователя" autocomplete="off">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button id="doLoginBtn">Войти и показать моё местоположение</button>
                <div class="demo-hint">
                    🧪 Тестовые данные: <strong>demo</strong> / <strong>demo123</strong>
                </div>
            </div>
        `;
        // Навесить обработчик
        const loginBtn = document.getElementById('doLoginBtn');
        if (loginBtn) {
            loginBtn.addEventListener('click', handleLogin);
        }
        // Также можно на enter
        const passInput = document.getElementById('loginPassword');
        if (passInput) {
            passInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleLogin();
            });
        }
    }

    function handleLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();

        if (username === VALID_CREDENTIALS.username && password === VALID_CREDENTIALS.password) {
            // успешный вход
            currentUser = username;
            localStorage.setItem('geoAuthUser', JSON.stringify({ username: currentUser, loggedIn: true }));
            // обновляем интерфейс
            userNameSpan.innerText = currentUser;
            logoutBtn.classList.remove('hidden');
            loginPanelDiv.classList.add('hidden');
            dashboardPanel.classList.remove('hidden');
            // запрашиваем геолокацию
            requestUserLocation();
        } else {
            alert('❌ Неверный логин или пароль. Используйте demo / demo123');
        }
    }

    function logout() {
        // очищаем localStorage и состояние
        localStorage.removeItem('geoAuthUser');
        currentUser = null;
        // сбрасываем карту
        if (mapInstance) {
            mapInstance.remove();
            mapInstance = null;
            currentMarker = null;
        }
        showLoginForm();
    }

    // Функция запроса геолокации и отображения на карте
    function requestUserLocation() {
        if (!navigator.geolocation) {
            showLocationError("❌ Ваш браузер не поддерживает геолокацию.");
            return;
        }

        // Показываем индикацию загрузки
        coordTextSpan.innerHTML = "⏳ Запрос разрешения на геолокацию...";
        addressTextSpan.innerHTML = "🏠 Ожидание координат...";

        navigator.geolocation.getCurrentPosition(
            (position) => {
                const { latitude, longitude, accuracy } = position.coords;
                const coords = [latitude, longitude];
                // Показать координаты
                coordTextSpan.innerHTML = `📍 Широта: ${latitude.toFixed(6)} | Долгота: ${longitude.toFixed(6)}<br>📡 Точность: ±${Math.round(accuracy)} м`;

                // Инициализация карты (если ещё не создана)
                if (!mapInstance) {
                    // создаем карту с центром в полученных координатах
                    mapInstance = L.map('map').setView(coords, 15);
                    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; CartoDB',
                        subdomains: 'abcd',
                        maxZoom: 19
                    }).addTo(mapInstance);
                } else {
                    mapInstance.setView(coords, 15);
                    if (currentMarker) {
                        currentMarker.remove();
                    }
                }

                // Добавляем маркер
                currentMarker = L.marker(coords).addTo(mapInstance)
                    .bindPopup(`<b>${currentUser || 'Пользователь'}</b><br>📍 Текущее местоположение`)
                    .openPopup();

                // Дополнительно можно добавить кружок точности
                const circle = L.circle(coords, {
                    radius: accuracy,
                    color: '#2c7da0',
                    weight: 1,
                    fillColor: '#4a9ec7',
                    fillOpacity: 0.2
                }).addTo(mapInstance);

                // Сохраним circle в маркер? не обязательно, но можно очистить позже, но для демо оставим
                // При повторном обновлении местоположения будем чистить старые круги
                if (window._currentAccuracyCircle) {
                    mapInstance.removeLayer(window._currentAccuracyCircle);
                }
                window._currentAccuracyCircle = circle;

                // Получаем адрес через обратный геокодинг (Nominatim)
                fetchAddress(latitude, longitude);
            },
            (error) => {
                console.error("Geolocation error:", error);
                let errorMsg = "";
                switch(error.code) {
                    case error.PERMISSION_DENIED:
                        errorMsg = "⚠️ Доступ к геолокации запрещён. Разрешите доступ в настройках браузера.";
                        break;
                    case error.POSITION_UNAVAILABLE:
                        errorMsg = "📡 Информация о местоположении недоступна.";
                        break;
                    case error.TIMEOUT:
                        errorMsg = "⏱️ Время запроса геолокации истекло.";
                        break;
                    default:
                        errorMsg = "❌ Неизвестная ошибка геолокации.";
                }
                showLocationError(errorMsg);
            },
            {
                enableHighAccuracy: true,
                timeout: 10000,
                maximumAge: 0
            }
        );
    }

    async function fetchAddress(lat, lng) {
        addressTextSpan.innerHTML = "🏠 Поиск адреса...";
        try {
            // Используем Nominatim OpenStreetMap (бесплатно, но для демо OK)
            const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`, {
                headers: {
                    'User-Agent': 'GeoWatchDemo/1.0'
                }
            });
            const data = await response.json();
            if (data && data.display_name) {
                let shortAddress = data.display_name.split(',');
                // возьмём первые 3-4 части для краткости
                let pretty = shortAddress.slice(0, 4).join(',');
                addressTextSpan.innerHTML = `🏠 ${pretty}...`;
                if (currentMarker) {
                    currentMarker.bindPopup(`<b>${currentUser}</b><br>📍 ${pretty}`).openPopup();
                }
            } else {
                addressTextSpan.innerHTML = "🏠 Адрес не определён (только координаты)";
            }
        } catch (err) {
            console.warn("Ошибка геокодинга:", err);
            addressTextSpan.innerHTML = "🏠 Не удалось получить адрес (сервис временно недоступен)";
        }
    }

    function showLocationError(message) {
        coordTextSpan.innerHTML = `❌ ${message}`;
        addressTextSpan.innerHTML = "🏠 Адрес недоступен";
        // Если карта ещё не создана, создадим карту по умолчанию (например, центр Москвы или Нью-Йорк)
        if (!mapInstance) {
            const defaultCenter = [55.751244, 37.618423]; // Москва
            mapInstance = L.map('map').setView(defaultCenter, 10);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(mapInstance);
            L.marker(defaultCenter).addTo(mapInstance)
                .bindPopup('❌ Геолокация не получена<br>Проверьте разрешения')
                .openPopup();
        } else {
            // если карта уже есть, просто добавим сообщение
            if (currentMarker) currentMarker.remove();
            currentMarker = L.marker(mapInstance.getCenter()).addTo(mapInstance)
                .bindPopup('⚠️ ' + message)
                .openPopup();
        }
    }

    // ---------- Инициализация при загрузке ----------
    function initApp() {
        const stored = localStorage.getItem('geoAuthUser');
        if (stored) {
            try {
                const userData = JSON.parse(stored);
                if (userData.loggedIn && userData.username) {
                    currentUser = userData.username;
                    userNameSpan.innerText = currentUser;
                    logoutBtn.classList.remove('hidden');
                    loginPanelDiv.classList.add('hidden');
                    dashboardPanel.classList.remove('hidden');
                    // Запрашиваем местоположение после того как DOM готов и панель видна
                    // Но карта будет создана после вызова requestUserLocation
                    requestUserLocation();
                } else {
                    showLoginForm();
                }
            } catch(e) {
                showLoginForm();
            }
        } else {
            showLoginForm();
        }

        // Обработчик кнопки выхода
        logoutBtn.addEventListener('click', () => {
            logout();
        });
    }

    // запускаем приложение
    initApp();
</script>
</body>
</html>
